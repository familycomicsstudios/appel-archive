<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appel Archive – Metadata Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f8f8f8;
      color: #222;
    }

    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #555; margin-top: 0; }

    .back-link { display: inline-block; margin-bottom: 1.5rem; color: #0066cc; }

    .mode-toggle {
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #333;
      font-size: 0.95rem;
    }

    .mode-toggle input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .field-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    label .field-desc {
      display: block;
      font-weight: 400;
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.1rem;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 0.5rem 0.7rem;
      font-family: system-ui, sans-serif;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    textarea {
      height: 80px;
      resize: vertical;
    }

    .array-hint {
      font-size: 0.8rem;
      color: #777;
      margin-top: 0.25rem;
    }

    button {
      margin-top: 0.6rem;
      padding: 0.5rem 1.4rem;
      font-size: 1rem;
      cursor: pointer;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #0052a3; }

    #output-section {
      margin-top: 2rem;
    }

    #output-section h2 {
      margin-bottom: 0.5rem;
    }

    #json-output {
      width: 100%;
      height: 220px;
      padding: 0.6rem;
      font-family: monospace;
      font-size: 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      background: #fff;
    }

    #copy-btn {
      margin-top: 0.4rem;
      background: #4a8;
    }
    #copy-btn:hover { background: #3a7; }

    #copy-msg {
      display: inline-block;
      margin-left: 0.8rem;
      font-size: 0.9rem;
      color: #3a7;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #copy-msg.visible { opacity: 1; }

    .error {
      color: #c00;
      background: #fff0f0;
      border: 1px solid #f99;
      border-radius: 4px;
      padding: 0.7rem 1rem;
    }

    a { color: #0066cc; }
  </style>
</head>
<body>
  <h1>Metadata Generator</h1>
  <p class="subtitle">Fill in the fields below to generate a level metadata JSON file.</p>
  <a class="back-link" href="index.html">← Back to Level Search</a>

  <label class="mode-toggle" for="advanced-mode">
    <input type="checkbox" id="advanced-mode" />
    Advanced mode
  </label>

  <div id="form-container">
    <p>Loading fields…</p>
  </div>

  <div id="output-section" style="display:none">
    <h2>Generated JSON</h2>
    <textarea id="json-output" readonly></textarea>
    <div>
      <button id="copy-btn">Copy to Clipboard</button>
      <span id="copy-msg">Copied!</span>
    </div>
  </div>

  <script>
    let fields = [];

    function isArrayField(field) {
      if (!field.sample_values || field.sample_values.length === 0) return false;
      return field.sample_values.some(v => Array.isArray(v));
    }

    function isSimpleField(field) {
      return field.simple === true;
    }

    function getVisibleFields() {
      const advancedModeCheckbox = document.getElementById('advanced-mode');
      const advancedModeEnabled = advancedModeCheckbox && advancedModeCheckbox.checked;
      if (advancedModeEnabled) return fields;
      return fields.filter(isSimpleField);
    }

    function buildForm() {
      const container = document.getElementById('form-container');
      container.innerHTML = '';

      const visibleFields = getVisibleFields();

      visibleFields.forEach(field => {
        const group = document.createElement('div');
        group.className = 'field-group';

        const label = document.createElement('label');
        label.htmlFor = 'field-' + field.field;
        label.textContent = field.display_name || field.field;

        if (field.description) {
          const desc = document.createElement('span');
          desc.className = 'field-desc';
          desc.textContent = field.description;
          label.appendChild(desc);
        }

        group.appendChild(label);

        const array = isArrayField(field);

        let input;
        if (field.field === 'description' || field.field === 'level_code') {
          input = document.createElement('textarea');
        } else if (field.field === 'mod_url') {
          input = document.createElement('input');
          input.type = 'url';
        } else {
          input = document.createElement('input');
          input.type = 'text';
        }
        input.id = 'field-' + field.field;
        input.dataset.fieldName = field.field;
        input.dataset.isArray = array ? 'true' : 'false';

        if (array && field.field !== 'description') {
          const hint = document.createElement('p');
          hint.className = 'array-hint';
          hint.textContent = 'Separate multiple values with a comma (e.g. Value 1, Value 2)';
          group.appendChild(input);
          group.appendChild(hint);
        } else {
          group.appendChild(input);
        }

        container.appendChild(group);
      });

      const generateBtn = document.createElement('button');
      generateBtn.id = 'generate-btn';
      generateBtn.textContent = 'Generate JSON';
      generateBtn.addEventListener('click', generateJSON);
      container.appendChild(generateBtn);
    }

    function generateJSON() {
      const result = {};
      const codeInput = document.getElementById('field-level_code');
      const codeValue = codeInput ? codeInput.value : '';

      const showError = (msg) => {
        const outputEl = document.getElementById('json-output');
        outputEl.value = '// Error: ' + msg;
        const section = document.getElementById('output-section');
        section.style.display = '';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const finish = (codeHash) => {
        getVisibleFields().forEach(field => {
          if (field.field === 'level_code') return;
          const input = document.getElementById('field-' + field.field);
          if (!input) return;

          const raw = input.value.trim();
          if (!raw) return;

          if (input.dataset.isArray === 'true') {
            result[field.field] = raw.split(',').map(s => s.trim()).filter(s => s.length > 0);
          } else {
            result[field.field] = raw;
          }
        });

        if (codeHash) {
          result['code_hash'] = codeHash;
        }

        const json = JSON.stringify(result, null, 2);
        const outputEl = document.getElementById('json-output');
        outputEl.value = json;

        const section = document.getElementById('output-section');
        section.style.display = '';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      if (codeValue.trim()) {
        const encoder = new TextEncoder();
        const data = encoder.encode(codeValue);
        crypto.subtle.digest('SHA-256', data).then(hashBuffer => {
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
          finish(hashHex);
        }).catch(err => {
          showError('Failed to hash level code: ' + err.message);
        });
      } else {
        finish(null);
      }
    }

    document.getElementById('copy-btn').addEventListener('click', () => {
      const outputEl = document.getElementById('json-output');
      if (!outputEl.value) return;
      navigator.clipboard.writeText(outputEl.value).then(() => {
        const msg = document.getElementById('copy-msg');
        msg.classList.add('visible');
        setTimeout(() => msg.classList.remove('visible'), 2000);
      });
    });

    document.getElementById('advanced-mode').addEventListener('change', () => {
      buildForm();
    });

    async function init() {
      const container = document.getElementById('form-container');
      try {
        const response = await fetch('fields.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        fields = await response.json();
        buildForm();
      } catch (err) {
        container.innerHTML = '<p class="error">Failed to load fields: ' + err.message + '</p>';
      }
    }

    init();
  </script>
</body>
</html>
